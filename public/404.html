<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Portfolio</title>
    <script>
      // SPA fallback: redirect to app root (works for any repo: /portfolio/, /stelios-vasileiou-cv/, etc.)
      var segments = location.pathname.split('/').filter(Boolean);
      var base = '/' + (segments[0] || '') + '/';
      location.replace(base);
    </script>
  </head>
