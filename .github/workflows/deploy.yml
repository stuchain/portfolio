# Build and deploy to GitHub Pages on push to main.
# In repository Settings → Pages, set source to "Deploy from a branch" and choose branch: gh-pages.
# Site will be at https://<user>.github.io/<repo-name>/

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write   # checkout + push to gh-pages branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          # Base path must match GitHub Pages URL: /<repo-name>/
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist
